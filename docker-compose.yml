x-common: &common
  build:
    context: .
    target: production-with-tests  # Build production image only after tests pass
  restart: unless-stopped
  env_file: .env
  mem_reservation: "6g"
  mem_limit: "8g"

services:
  subtensor-gateway:
    <<: *common
    mem_reservation: "1g"
    mem_limit: "1g"
    container_name: babelbit-subtensor-gateway
    ports:
      - "8090:8090"
    environment:
      SUBTENSOR_GATEWAY_HOST: 0.0.0.0
      SUBTENSOR_GATEWAY_PORT: 8090
    volumes:
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    command: ["bb", "-v", "subtensor-gateway"]

  model-cache:
      <<: *common
      container_name: babelbit-model-cache
      # One-shot prewarm: download embedding model into a shared cache volume
      restart: "no"
      environment:
        HF_HOME: /opt/hf
        TRANSFORMERS_CACHE: /opt/hf/transformers
        SENTENCE_TRANSFORMERS_HOME: /opt/hf/sentence_transformers
        # Disable hf_transfer fast-download unless the package is installed in the image
        HF_HUB_ENABLE_HF_TRANSFER: 0
        BB_AUDIO_SCORING_EMBEDDER: ${BB_AUDIO_SCORING_EMBEDDER:-sentence-transformers/all-MiniLM-L6-v2}
      volumes:
        - hf-cache:/opt/hf
      command: [
        "python",
        "-c",
        "import os, importlib.util; os.environ.setdefault('HF_HUB_ENABLE_HF_TRANSFER','0'); os.environ['HF_HUB_ENABLE_HF_TRANSFER'] = '1' if importlib.util.find_spec('hf_transfer') else '0'; from sentence_transformers import SentenceTransformer; m=os.getenv('BB_AUDIO_SCORING_EMBEDDER','sentence-transformers/all-MiniLM-L6-v2'); print('[PREWARM] caching', m, 'with hf_transfer=', os.environ['HF_HUB_ENABLE_HF_TRANSFER']); SentenceTransformer(m); print('[PREWARM] done')"
      ]
  validator:
    <<: *common
    mem_reservation: "1g"
    mem_limit: "1g"
    container_name: babelbit-validator
    environment:
      - BABELBIT_CACHE_DIR=/app/data/blocks 
      - SIGNER_URL=http://signer:8080
      - SUBTENSOR_GATEWAY_URL=http://subtensor-gateway:8090
      - BB_CHALLENGE_STATUS_DIR=/app/data/challenge_status
      - PG_HOST=${PG_HOST}
      - PG_PORT=${PG_PORT}
      - PG_DB=${PG_DB}
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}

    volumes:
      - validator-cache:/app/data/blocks
      - challenge-status:/app/data/challenge_status  # Shared challenge status tracking
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro  # Mount Bittensor wallets
    ports:
      - "8001:8000"
    depends_on:
      subtensor-gateway:
        condition: service_healthy
      signer:
        condition: service_healthy
    command: ["bb", "-v", "validate"]


  runner:
    <<: *common
    container_name: babelbit-runner
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro  # Mount Bittensor wallets
      - challenge-status:/app/data/challenge_status  # Shared challenge status tracking
      - hf-cache:/opt/hf  # Allow writes so HF cache can record missing files/sentinels
    ports:
      - "8002:8000"
    environment:
      BABELBIT_METRICS_PORT: 8000
      BABELBIT_METRICS_ADDR: 0.0.0.0
      SIGNER_URL: http://signer:8080
      SUBTENSOR_GATEWAY_URL: http://subtensor-gateway:8090
      BB_CHALLENGE_STATUS_DIR: /app/data/challenge_status
      PG_HOST: ${PG_HOST}
      PG_PORT: ${PG_PORT}
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      HF_HOME: /opt/hf
      TRANSFORMERS_CACHE: /opt/hf/transformers
      SENTENCE_TRANSFORMERS_HOME: /opt/hf/sentence_transformers
      HF_HUB_ENABLE_HF_TRANSFER: 0
      BB_AUDIO_SCORING_EMBEDDER: ${BB_AUDIO_SCORING_EMBEDDER:-sentence-transformers/all-MiniLM-L6-v2}
    command: ["bb", "-v", "runner"]

  signer:
    <<: *common
    mem_reservation: "1g"
    mem_limit: "1g"
    container_name: babelbit-signer
    ports:
      - "8080:8080"
    environment:
      SIGNER_HOST: 0.0.0.0
      SIGNER_PORT: 8080
      SUBTENSOR_GATEWAY_URL: http://subtensor-gateway:8090

    volumes:
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro
    depends_on:
      subtensor-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    command: ["bb", "-v", "signer"]


volumes:
  # TODO: add scores and logs as volumes
  validator-cache:
  challenge-status:  # Shared volume for challenge status tracking between validator and runner
  hf-cache:
